name: Memory Atlas Acceptance

on:
  push:
    branches: [main]
    paths:
      - "MemoryAtlas/**"
      - "OpenAIDatabase/**"
      - ".github/workflows/memory-atlas-acceptance.yml"
  pull_request:
    paths:
      - "MemoryAtlas/**"
      - "OpenAIDatabase/**"
      - ".github/workflows/memory-atlas-acceptance.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: memory-atlas-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Build and verify Memory Atlas
        working-directory: OpenAIDatabase
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" python3 scripts/atlasctl.py build-atlas --apply
          npm ci --prefix ../MemoryAtlas
          npm run build --prefix ../MemoryAtlas
          python3 scripts/run_verification.py --tier fast
          python3 scripts/run_verification.py --tier unit
          python3 scripts/run_verification.py --tier security
          python3 scripts/run_verification.py --tier integration
          python3 scripts/atlasctl.py audit --check goal-completion
