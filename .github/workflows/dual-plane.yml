name: Dual-Plane Governance

# 全仓强制：本仓每个双平面项目都必须就位七文件架构并过门。
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dual-plane-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dual-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: 安装 PyYAML（渲染 config.yaml / data_contract.yaml 需要，保证渲染确定性）
        run: python3 -m pip install --quiet pyyaml
      - name: 运行全仓双平面合规校验
        run: |
          set -euo pipefail
          SCRIPT="$(find . -path '*/machine/tools/check_dual_plane_ci.py' | sort | head -1)"
          if [ -z "$SCRIPT" ]; then
            echo "FAIL: 未找到 check_dual_plane_ci.py（本仓应至少有一个双平面项目）"
            exit 1
          fi
          echo "runner: $SCRIPT"
          python3 "$SCRIPT" --root . --require-projects
