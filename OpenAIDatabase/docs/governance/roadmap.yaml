schema_version: "codexproject.roadmap.v1"
roadmap_kind: "product"
project_id: "OpenAIDatabase"
current_stage_id: "SM-P0"
current_phase_id: "SM-P0-RUN0A"
current_task_id: "OAIDB-RUN0A-20260713"
next_gate_id: "ACC-OAIDB-RUN0A-20260713-PASSED"
total_estimated_hours: 7.5
completed_estimated_hours: 6.5
stages:
  -
    stage_id: "S5"
    name: "项目迁移与三文件重建"
    person_goal: "逐项目把治理真相保留下来，把治理计算从每次开发动作中移出去。"
    status: "in_progress"
    stop_conditions:
      - "一次 PR 同时迁移多个项目"
      - "无证据事实被写入 VERIFIED"
      - "业务测试失败被忽略"
    stop_gate:
      gate_id: "S5-GATE"
      status: "open"
      pass_conditions:
        - "10/10 项目通过结构、准确性和人类可读验收"
        - "迁移过程中无批量空泛文档"
      evidence_refs:
        - "migration_PRs"
        - "full_readonly_baseline"
        - "project_acceptance_matrix"
    phases:
      -
        phase_id: "S5PB"
        name: "剩余项目治理压缩迁移"
        objective: "收敛现有大量治理文档，保留有用事实并恢复三文件。"
        status: "in_progress"
        stop_conditions:
          - "任何项目缺少 owner-readable 三文件"
          - "未知事实被写成 VERIFIED"
        stop_gate:
          gate_id: "S5PB-GATE"
          status: "in_progress"
          pass_conditions:
            - "全部 10 个项目 Lean v2 合规"
            - "三文件均非索引页"
            - "每项目 focused tests 通过"
          evidence_refs:
            - "ten_project_matrix"
            - "validation_all"
            - "owner_signoffs"
        tasks:
          -
            task_id: "S5PBT03"
            name: "迁移 OpenAIDatabase"
            objective: "建立记忆分析能力、规则和 Roadmap 事实源。"
            status: "completed"
            estimated_hours: 4
            total_hours_percent: "2.04%"
            dependencies:
              - "S5PBT02"
            acceptance_ids:
              - "ACC-S5PBT03"
            test_commands:
              - "python -B -m unittest ...test_review9_s5pbt03_* -q"
              - "python -B scripts/lean_governance.py check-render --project OpenAIDatabase"
              - "python -B scripts/lean_governance.py validate --changed-only --enforce-sync --semantic --base-ref origin/main"
            evidence_refs:
              - "OpenAIDatabase/docs/governance/project.yaml"
              - "OpenAIDatabase/docs/governance/roadmap.yaml"
              - "OpenAIDatabase/docs/governance/events.jsonl"
              - "governance/run_manifests/GOV-REVIEW9-S5PBT03-OPENAIDATABASE-CANONICAL-RENDER-20260624.json"
            risk: "范围扩张、事实失真或治理回归"
            rollback: "Revert only this task commit; retain the read-only audit evidence."
          -
            task_id: "MACDATA-PROM2-SETUP-20260705"
            name: "proM2 MacData 归档与清理自动化设置"
            objective: "安装 OpenAIDatabase/macdata/proM2 任务包，按本机 M2 Max 覆盖设备预期，生成 owner confirmations，配置 GitHub 归档分支，并固定远程验证后受控清理策略。"
            status: "in_progress"
            estimated_hours: 1
            total_hours_percent: "0.51%"
            dependencies:
              - "S5PBT03"
            acceptance_ids:
              - "ACC-MACDATA-PROM2-SETUP-20260705"
            test_commands:
              - "python3 -m unittest OpenAIDatabase/macdata/proM2/tests/test_macdata_package.py -q"
              - "python3 OpenAIDatabase/macdata/proM2/scripts/run_controlled_cycle.py --repo-root . --preflight-only"
              - "git ls-remote origin refs/heads/macdata-proM2"
            evidence_refs:
              - "OpenAIDatabase/macdata/proM2/config/device_config.json"
              - "OpenAIDatabase/macdata/proM2/config/owner_confirmations.json"
              - "OpenAIDatabase/macdata/proM2/tests/test_macdata_package.py"
            risks: "Docker/Homebrew/系统缓存/项目缓存清理必须受远程验证和白名单约束；不得读取凭证、Time Machine、iCloud、Keychain、shell history、完整环境变量或 .env 原文。"
            rollback: "Revert setup commit；删除远程 macdata-proM2 分支前必须确认不再需要其历史。"
  - stage_id: "CF-L2"
    name: "MemoryAtlas Cloudflare 安全 L2 派生数据查看器"
    person_goal: "Owner 能通过公开安全的产品表面理解项目能力与边界，同时私密核心保持离线。"
    status: "completed"
    estimated_hours: 2
    estimated_pct: 100
    stop_conditions:
      - "raw archive、private import、cookie、session、本机数据库和明文 secret 不得进入 public surface。"
      - "public dist 出现 secret、private/raw/export 数据或本机绝对路径"
      - "只有 dry-run、Access 登录页或旧 live 页面却宣称当前 commit 已部署"
    stop_gate:
      gate_id: "ACC-CF-L2-20260710"
      pass_criteria:
        - "安全 L2 adapter build 通过"
        - "private distribution scan 通过"
        - "Wrangler dry-run 通过"
        - "永久 Cloudflare deploy 返回可访问 URL 且 HTTP smoke check 通过"
      evidence:
        - "apps/memory-atlas"
        - "docs/governance/development_events.jsonl"
        - "docs/governance/project.yaml"
      failure_action: "blocked"
    phases:
      - phase_id: "CF-L2-P1"
        name: "安全 adapter、验证与永久部署"
        objective: "交付只读取 redacted derived snapshot 的 MemoryAtlas L2 viewer，私密 core 保持 L1。"
        status: "completed"
        estimated_hours: 2
        estimated_pct: 100
        stop_conditions:
          - "安全边界或真实性 gate 失败"
          - "Cloudflare Workers 永久授权不可用"
        stop_gate:
          gate_id: "ACC-CF-L2-20260710"
          pass_criteria:
            - "repo 配置、build、scan、dry-run 和真实 URL 证据完整"
          evidence:
            - "docs/governance/development_events.jsonl"
            - "docs/governance/project.yaml"
          failure_action: "remain_blocked"
        tasks:
          - task_id: "CF-L2-20260710"
            name: "Cloudflare Compatibility Envelope L2"
            objective: "交付只读取 redacted derived snapshot 的 MemoryAtlas L2 viewer，私密 core 保持 L1。"
            status: "completed"
            estimated_hours: 2
            estimated_pct: 100
            dependencies: []
            acceptance_ids:
              - "ACC-CF-L2-20260710"
            acceptance:
              - acceptance_id: "ACC-CF-L2-20260710"
                description: "安全 L2 surface 必须永久部署并经 HTTP 验证；不得暴露私密核心或伪造 deploy。"
                evidence_refs:
                  - "docs/governance/development_events.jsonl"
                  - "docs/governance/project.yaml"
            test_commands:
              - "npm run build；privacy/accessibility gate；private dist scan；Wrangler 4.110.0 dry-run"
            test_results:
              - "Vite build、privacy/accessibility、private scan、desktop/mobile QA 与 dry-run PASS；Cloudflare Pages deployment 82988d29 从 clean commit 5a24333e 部署，owner-allowlist Access challenge、allowed-user app load、runtime JSON fetch 和 artifact safety 已验证。"
            evidence_refs:
              - "apps/memory-atlas"
              - "docs/governance/development_events.jsonl"
              - "docs/governance/project.yaml"
            risks:
              - "raw archive、private import、cookie、session、本机数据库和明文 secret 不得进入 public surface。"
              - "从 Pages 迁移到 Workers 时必须先为每个可达 hostname 保持 owner-allowlist Access，禁止重复出现短暂公开暴露。"
            rollback: "删除隔离的 L2 adapter 并回滚本任务治理记录；私密 core 不需要恢复。"
            current_result: "deployed_custom_domain_verified_access_protected"
            completed_version: "0.2.0"
  - stage_id: "SM-P0"
    name: "跨 Agent 共享记忆 P0 前置治理"
    person_goal: "在实现 Codex、Claude、ChatGPT 共享记忆前，先让 OpenAIDatabase 只有一套可机器重建的当前治理事实。"
    status: "completed"
    estimated_hours: 0.5
    estimated_pct: 100
    stop_conditions:
      - "任一 human view 无法由 canonical governance 确定性重建"
      - "修复需要读取 raw/private、修改其他项目或改变产品运行行为"
      - "check-render、changed-scope governance 或 diff check 失败"
    stop_gate:
      gate_id: "ACC-OAIDB-RUN0A-20260713"
      pass_criteria:
        - "三份 human views 与 canonical render 完全一致"
        - "仅 OpenAIDatabase governance/human files 发生变化"
        - "未改变 model、formula、parameter 或记忆运行行为"
      evidence:
        - "EVID-OAIDB-RUN0A-CHECK-RENDER"
        - "OpenAIDatabase/docs/governance/project.yaml"
        - "OpenAIDatabase/docs/governance/roadmap.yaml"
        - "OpenAIDatabase/docs/governance/events.jsonl"
      failure_action: "remain_blocked_before_run1"
    phases:
      - phase_id: "SM-P0-RUN0A"
        name: "RUN 0A canonical human-view 收敛"
        objective: "删除重复可编辑的历史前缀，并从 machine canonical facts 重建三份中文 owner 入口。"
        status: "completed"
        estimated_hours: 0.5
        estimated_pct: 100
        stop_conditions:
          - "任何历史只能通过新建第二事实源才能保留"
          - "renderer 输出无法通过当前治理 schema"
        stop_gate:
          gate_id: "ACC-OAIDB-RUN0A-20260713"
          pass_criteria:
            - "check-render drift_count=0"
            - "reference_issue_count=0"
          evidence:
            - "EVID-OAIDB-RUN0A-CHECK-RENDER"
          failure_action: "remain_blocked_before_run1"
        tasks:
          - task_id: "OAIDB-RUN0A-20260713"
            name: "收敛 OpenAIDatabase 三份 human views"
            objective: "以 project.yaml、roadmap.yaml、events.jsonl 为唯一机器事实源，确定性重建三份中文 human views。"
            status: "completed"
            estimated_hours: 0.5
            estimated_pct: 100
            dependencies:
              - "S5PBT03"
            acceptance_ids:
              - "ACC-OAIDB-RUN0A-20260713"
            acceptance:
              - acceptance_id: "ACC-OAIDB-RUN0A-20260713"
                description: "三份 human views 必须与 canonical render 完全一致，且不修改其他项目或产品运行行为。"
                evidence_refs:
                  - "EVID-OAIDB-RUN0A-CHECK-RENDER"
            test_commands:
              - "python3.12 -B scripts/lean_governance.py check-render --project OpenAIDatabase"
              - "python3.12 -B scripts/lean_governance.py validate --changed-only --enforce-sync --semantic --base-ref origin/main"
              - "git diff --check -- OpenAIDatabase"
            test_results:
              - "check-render drift_count=0 reference_issue_count=0"
            evidence_refs:
              - "EVID-OAIDB-RUN0A-CHECK-RENDER"
              - "OpenAIDatabase/docs/governance/project.yaml"
              - "OpenAIDatabase/docs/governance/roadmap.yaml"
              - "OpenAIDatabase/docs/governance/events.jsonl"
            risks:
              - "详细历史不再作为当前 human-view 可编辑事实；需要时从 Git commit 历史恢复。"
            rollback: "Revert RUN 0A commit to restore the prior human views and governance state."
            current_result: "canonical_human_views_converged_pending_run0_rerun"
